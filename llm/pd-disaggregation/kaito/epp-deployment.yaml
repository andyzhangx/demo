apiVersion: apps/v1
kind: Deployment
metadata:
  name: phi-4-mini-inferencepool-epp
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      inferencepool: phi-4-mini-inferencepool-epp
  template:
    metadata:
      labels:
        inferencepool: phi-4-mini-inferencepool-epp
    spec:
      serviceAccountName: phi-4-mini-inferencepool-epp
      containers:
        - name: tokenizer
          image: upstream.azurecr.io/oss/v2/vllm/vllm-openai-cpu:v0.21.0
          command: ["python3"]
          args:
            - -m
            - vllm.entrypoints.cli.main
            - launch
            - render
            - microsoft/phi-4-mini-instruct
            - --port=8100
          ports:
            - containerPort: 8100
              name: tokenizer
              protocol: TCP
          env:
            - name: VLLM_TARGET_DEVICE
              value: "cpu"
            - name: USER
              value: "nonroot"
            - name: TORCHINDUCTOR_CACHE_DIR
              value: "/tmp/torch-cache"
            - name: HF_HOME
              value: "/tmp/hf-home"
            - name: TRANSFORMERS_CACHE
              value: "/tmp/hf-home"
            - name: VLLM_CACHE_ROOT
              value: "/tmp/vllm-cache"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
        - name: epp
          image: mcr.microsoft.com/oss/v2/llm-d/llm-d-inference-scheduler:v0.8.0
          args:
            - --pool-name
            - phi-4-mini-inferencepool
            - --pool-namespace
            - default
            - --pool-group
            - inference.networking.k8s.io
            - --zap-encoder
            - json
            - --config-file
            - /config/config.yaml
            - --secure-serving
            - "false"
            - --v
            - "1"
            - --tracing=false
          ports:
            - containerPort: 9002
              name: grpc
              protocol: TCP
            - containerPort: 9003
              name: grpc-health
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          livenessProbe:
            grpc:
              port: 9003
              service: inference-extension
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 9003
              service: inference-extension
            periodSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: plugins-config-volume
              mountPath: /config
      tolerations:
        - key: node.kubernetes.io/memory-pressure
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: plugins-config-volume
          configMap:
            name: phi-4-mini-inferencepool-epp
