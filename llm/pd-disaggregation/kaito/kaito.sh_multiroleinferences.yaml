apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: multiroleinferences.kaito.sh
spec:
  group: kaito.sh
  names:
    categories:
    - kaito
    kind: MultiRoleInference
    listKind: MultiRoleInferenceList
    plural: multiroleinferences
    shortNames:
    - mri
    singular: multiroleinference
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.model.name
      name: Model
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MultiRoleInference is the Schema for the multiroleinferences API.
          It orchestrates prefill/decode disaggregated inference by creating child InferenceSets,
          a shared InferencePool, and an EPP configured for P/D-aware request routing.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MultiRoleInferenceSpec defines the desired state of MultiRoleInference.
            properties:
              eppPluginsConfig:
                description: |-
                  EPPPluginsConfig references a ConfigMap containing custom EPP plugins configuration.
                  If not set, the controller auto-generates a standard P/D disaggregation plugin config
                  with prefill-filter, decode-filter, precise-prefix-cache-scorer, and load-aware-scorer.
                type: string
              labelSelector:
                description: |-
                  LabelSelector is propagated to generated child workloads (InferenceSets, Workspaces).
                  The InferencePool uses this selector (plus apps.kubernetes.io/pod-index: "0" for
                  Ray cluster support) to discover all prefill and decode workspaces.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
                x-kubernetes-validations:
                - message: labelSelector must have at least one matchLabels or matchExpressions
                    entry
                  rule: (has(self.matchLabels) && size(self.matchLabels) > 0) || (has(self.matchExpressions)
                    && size(self.matchExpressions) > 0)
              model:
                description: Model defines the shared model configuration across all
                  roles.
                properties:
                  modelAccessSecret:
                    description: |-
                      ModelAccessSecret references a Secret containing credentials for model download
                      (e.g., HuggingFace token). Applied to all child workloads.
                    type: string
                  name:
                    description: |-
                      Name is the model identifier (e.g., HuggingFace model ID).
                      This maps to the preset name used when generating child InferenceSets.
                    type: string
                required:
                - name
                type: object
              roles:
                description: |-
                  Roles defines the role topology of this inference service.
                  Exactly two roles are required: one prefill and one decode.
                items:
                  description: MultiRoleInferenceRoleSpec defines the configuration
                    for a single inference role.
                  properties:
                    instanceType:
                      description: |-
                        InstanceType specifies the GPU node SKU for this role.
                        Different roles may use different instance types (e.g., larger GPU for prefill).
                      type: string
                    replicas:
                      default: 1
                      description: |-
                        Replicas is the number of workspaces (InferenceSet replicas) for this role.
                        Each replica maps to one Workspace → one StatefulSet.
                      format: int32
                      minimum: 1
                      type: integer
                    runtimeConfig:
                      description: |-
                        RuntimeConfig references a ConfigMap with role-specific vLLM runtime arguments.
                        These override or extend the default inference parameters for this role.
                      type: string
                    type:
                      description: 'Type is the role type. Supported values: prefill,
                        decode.'
                      enum:
                      - prefill
                      - decode
                      type: string
                  required:
                  - instanceType
                  - type
                  type: object
                maxItems: 2
                minItems: 2
                type: array
                x-kubernetes-validations:
                - message: exactly one prefill and one decode role required
                  rule: self.exists(r, r.type == 'prefill') && self.exists(r, r.type
                    == 'decode')
            required:
            - labelSelector
            - model
            - roles
            type: object
          status:
            description: MultiRoleInferenceStatus defines the observed state of MultiRoleInference.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the MultiRoleInference's state.
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
